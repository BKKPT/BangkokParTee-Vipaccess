<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bangkok ParTee - VIP Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Inter', sans-serif; background-color: #000;
            overflow: hidden; /* กันหน้าจอสั่นหรือเลื่อน */
        }

        /* พื้นหลังชัดเจน 100% */
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        .bg-container img {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* กล่อง Login ล็อกให้อยู่กลางจอเสมอ */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center; /* จัดกลางแนวตั้ง */
            justify-content: center; /* จัดกลางแนวนอน */
            z-index: 10;
            padding: 24px;
        }

        .login-card {
            background: rgba(0, 0, 0, 0.75); /* ความทึบของกล่อง */
            backdrop-filter: blur(10px); /* เอฟเฟกต์กระจกฝ้า */
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 2rem;
            width: 100%;
            max-width: 340px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .custom-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 16px;
            outline: none;
            font-size: 14px;
        }
        .custom-input:focus { border-color: #d4af37; background: rgba(255, 255, 255, 0.1); }

        .btn-gold {
            background: linear-gradient(to bottom, #e0c367, #aa8529);
            color: black;
            font-weight: 800;
            text-transform: uppercase;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            letter-spacing: 2px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(170, 133, 41, 0.4);
        }
        
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-container">
        <img src="https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png" alt="Cover Image">
    </div>

    <div id="login-view" class="login-overlay fade-in">
        <div class="login-card">
            <h2 style="color: #d4af37; letter-spacing: 4px; text-transform: uppercase; font-size: 14px; margin-bottom: 30px; font-family: 'Playfair Display', serif;">Member Access</h2>
            
            <form onsubmit="handleLogin(event)">
                <input type="text" id="member-id" placeholder="USER ID" class="custom-input uppercase" required>
                <input type="password" id="vip-password" placeholder="PASSWORD" class="custom-input" required>
                
                <button type="submit" class="btn-gold">Enter</button>
            </form>
            
            <p id="error-txt" class="hidden" style="color: #ff5555; font-size: 10px; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px;">Invalid ID or Password</p>
        </div>
    </div>

    <div id="home-view" class="hidden" style="position: relative; z-index: 20; padding-top: 60px;">
        <div style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: -1;"></div>
        <h1 style="text-align: center; color: #d4af37; letter-spacing: 5px; text-transform: uppercase; font-family: 'Playfair Display', serif;">Bangkok ParTee</h1>
        <p style="text-align: center; color: #888; font-size: 10px; letter-spacing: 2px;">SUCCESSFULLY LOGGED IN</p>
        </div>

    <script>
        const VALID_ID = "VPB1001";
        const VALID_PASS = "V1234";

        function handleLogin(e) {
            e.preventDefault();
            const id = document.getElementById('member-id').value.toUpperCase();
            const pass = document.getElementById('vip-password').value;
            const error = document.getElementById('error-txt');

            if(id === VALID_ID && pass === VALID_PASS) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('home-view').classList.remove('hidden');
            } else {
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 3000);
            }
        }
    </script>
</body>
</html>
