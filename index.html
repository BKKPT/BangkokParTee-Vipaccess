<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangkok ParTee - Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: white; margin: 0; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        .custom-input { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(212, 175, 55, 0.4); color: white; }
        .custom-input:focus { border-color: #d4af37; outline: none; background: rgba(0, 0, 0, 0.8); }
        
        /* กล่อง Login ลอยตัวและเบลอพื้นหลังเฉพาะจุดเพื่อให้รูปหน้าปกยังชัด */
        .login-card {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        .selected-card { border: 4px solid #d4af37 !important; transform: scale(1.02); }
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="fixed inset-0 z-0">
    <img src="https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png" class="w-full h-full object-cover opacity-100">
    <div id="main-overlay" class="absolute inset-0 bg-black/40 transition-all duration-700"></div>
</div>

<div id="login-view" class="relative z-20 min-h-screen flex items-center justify-center px-6">
    <div class="login-card w-full max-w-sm p-10 rounded-[2.5rem] text-center shadow-2xl">
        <h2 class="text-[#d4af37] tracking-[0.2em] uppercase mb-8 font-serif text-sm">Member Access</h2>
        <form onsubmit="handleLogin(event)" class="space-y-4">
            <input type="text" id="member-id" placeholder="MEMBER ID" class="custom-input w-full text-center py-4 rounded-2xl text-xs tracking-widest uppercase font-bold" required>
            <input type="password" id="vip-password" placeholder="PASSWORD" class="custom-input w-full text-center py-4 rounded-2xl text-xs tracking-widest" required>
            <button type="submit" class="w-full py-4 rounded-2xl bg-gradient-to-b from-[#e0c367] to-[#aa8529] text-black font-extrabold uppercase text-xs tracking-[0.2em] shadow-lg active:scale-95 transition-all">
                Enter
            </button>
        </form>
        <p id="login-error" class="text-red-500 text-[10px] mt-4 hidden uppercase tracking-widest font-bold">Invalid ID or Password</p>
    </div>
</div>

<div id="home-view" class="hidden relative z-10 min-h-screen py-12 px-4 max-w-6xl mx-auto fade-in">
    <div class="text-center mb-10">
        <h1 class="text-3xl font-serif text-[#d4af37] tracking-widest uppercase">Bangkok ParTee</h1>
        <p id="selection-count" class="text-neutral-400 text-[10px] tracking-[0.2em] uppercase mt-2">Selected: 0/2</p>
    </div>

    <div id="main-gallery" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-32"></div>

    <div id="next-btn-container" class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black to-transparent flex justify-center hidden">
        <button onclick="goToForm()" class="w-full max-w-md py-4 rounded-full bg-[#d4af37] text-black font-bold tracking-widest uppercase shadow-2xl transition-all">
            Next Step
        </button>
    </div>
</div>

<div id="form-view" class="hidden relative z-20 min-h-screen flex items-center justify-center px-6 fade-in">
    <div class="login-card w-full max-w-md p-8 rounded-[2rem] border border-[#d4af37]/30 shadow-2xl">
        <h2 class="text-[#d4af37] font-serif text-xl mb-6 text-center uppercase tracking-widest">Booking Details</h2>

        <div class="space-y-3">
            <input type="date" id="book-date" class="custom-input w-full p-4 rounded-xl">
            <input type="time" id="book-time" class="custom-input w-full p-4 rounded-xl">
            <input type="text" id="book-course" placeholder="Golf Course" class="custom-input w-full p-4 rounded-xl">

            <div class="py-2 border-t border-white/10 mt-2">
                <p class="text-[10px] text-[#d4af37] mb-2 uppercase tracking-widest">จองสนามแล้วหรือยัง?</p>
                <div class="flex gap-6">
                    <label class="text-xs flex items-center gap-2 cursor-pointer"><input type="radio" name="booked-yet" value="Yes" class="accent-[#d4af37]"> Yes</label>
                    <label class="text-xs flex items-center gap-2 cursor-pointer"><input type="radio" name="booked-yet" value="No" class="accent-[#d4af37]"> No</label>
                </div>
            </div>
            
            <p class="text-[9px] text-neutral-400 italic mb-4">* มีบริการประสานงานจองเวลาและแคดดี้ ค่าบริการ 300 บาท</p>

            <button onclick="sendToLine()" class="w-full py-4 rounded-xl bg-[#d4af37] text-black font-bold uppercase tracking-widest text-xs shadow-lg">
                Confirm & Send LINE
            </button>
            <button onclick="backToSelection()" class="w-full text-[9px] text-neutral-500 uppercase mt-2">Back to edit</button>
        </div>
    </div>
</div>

<script>
// --- ส่วนการตั้งค่า ---
const VALID_MEMBER_ID = "VIP001"; // เปลี่ยนได้ตามต้องการ
const VALID_PASSWORD = "Viptest2026"; 
const LINE_ID = "https://lin.ee/wIkQHc5F"; 

const companions = [
 {id:1,name:"Mochi",price:"5,000 THB",cover:"https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"},
 {id:2,name:"Nana",price:"5,500 THB",cover:"https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"},
 {id:3,name:"Yuki",price:"6,000 THB",cover:"https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"},
 {id:4,name:"Sora",price:"6,500 THB",cover:"https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"}
];

let selectedIds = [];

// ฟังก์ชัน Login ที่แก้ไขแล้ว (ไม่ใช้ btoa เพื่อกันความผิดพลาด)
function handleLogin(e){
 e.preventDefault();
 const idInput = document.getElementById('member-id').value.toUpperCase();
 const passInput = document.getElementById('vip-password').value;
 const errorEl = document.getElementById('login-error');

 if(idInput === VALID_MEMBER_ID && passInput === VALID_PASSWORD){
  document.getElementById('login-view').classList.add('hidden');
  document.getElementById('home-view').classList.remove('hidden');
  document.getElementById('main-overlay').classList.replace('bg-black/40', 'bg-black/70'); // หน้าเนื้อหาทำให้มืดลงเพื่อให้อ่านง่าย
  renderGallery();
 } else {
  errorEl.classList.remove('hidden');
  setTimeout(() => errorEl.classList.add('hidden'), 3000);
 }
}

function renderGallery(){
 const el=document.getElementById('main-gallery');
 el.innerHTML=companions.map(p=>`
  <div id="card-${p.id}" onclick="toggleSelect(${p.id},'${p.name}')" class="cursor-pointer group">
   <div class="rounded-xl overflow-hidden border border-white/10 transition-all duration-300 card-frame bg-zinc-900">
    <img src="${p.cover}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform">
   </div>
   <p class="text-center mt-2 text-[#d4af37] font-bold text-xs uppercase">${p.name}</p>
   <p class="text-center text-[10px] text-neutral-400">${p.price}</p>
  </div>
 `).join('');
}

function toggleSelect(id,name){
 const el=document.getElementById(`card-${id}`).querySelector('.card-frame');
 if(selectedIds.includes(name)){
  selectedIds=selectedIds.filter(x=>x!==name);
  el.classList.remove("selected-card");
 }else{
  if(selectedIds.length>=2){alert("เลือกได้สูงสุด 2 คนค่ะ");return;}
  selectedIds.push(name);
  el.classList.add("selected-card");
 }
 document.getElementById('selection-count').innerText=`Selected: ${selectedIds.length}/2`;
 document.getElementById('next-btn-container').classList.toggle('hidden',selectedIds.length===0);
}

function goToForm(){
 document.getElementById('home-view').classList.add('hidden');
 document.getElementById('form-view').classList.remove('hidden');
}

function backToSelection() {
 document.getElementById('form-view').classList.add('hidden');
 document.getElementById('home-view').classList.remove('hidden');
}

async function sendToLine(){
 const date=document.getElementById('book-date').value;
 const time=document.getElementById('book-time').value;
 const course=document.getElementById('book-course').value;
 const bookedYet=document.querySelector('input[name="booked-yet"]:checked')?.value||"No";

 if(!date||!time||!course){alert("กรุณากรอกข้อมูลให้ครบถ้วน");return;}

 const data={name:selectedIds.join(", "),date,time,course,bookedYet};

 // 🔥 Google Sheet (ใส่ try-catch เพื่อไม่ให้แอปค้างถ้าส่งไม่สำเร็จ)
 try {
  await fetch("https://script.google.com/macros/s/AKfycbyp2jwgxLIPXO4fI-sQNVa5-4DbEkVzwhp6TB4bnFctBA4VnBiJgVIsgkavTPA5pbYm/exec",{
   method:"POST",
   mode: 'no-cors',
   body:JSON.stringify(data)
  });
 } catch (e) { console.log("Sheet Error", e); }

 // 🔥 LINE
 const msg=encodeURIComponent(
  📍 Bangkok ParTee Booking\n👯 ${data.name}\n📅 วันที่: ${date}\n⏰ เวลา: ${time}\n⛳ สนาม: ${course}\n✅ จองสนามแล้ว: ${bookedYet}
 );
 window.location.href=`https://line.me/R/ti/p/${LINE_ID}?text=${msg}`;
}
</script>

</body>
</html>
