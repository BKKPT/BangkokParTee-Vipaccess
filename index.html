<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bangkok ParTee - Private Access</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        body, html { 
            margin: 0; padding: 0; background: #000; color: white; 
            font-family: 'Inter', sans-serif; overflow-x: hidden;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }
        
        .font-serif { font-family: 'Playfair Display', serif; }
        .bg-full { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; object-fit: cover; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 2; transition: all 0.5s; }

        .glass-card {
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 2rem;
        }

        .custom-input {
            width: 100%; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(212, 175, 55, 0.3);
            color: #fff; padding: 14px; border-radius: 12px; text-align: center; outline: none;
        }

        .gold-btn {
            background: linear-gradient(180deg, #e0c367 0%, #aa8529 100%);
            color: #000; font-weight: 800; padding: 14px; border-radius: 12px;
            text-transform: uppercase; letter-spacing: 1px; width: 100%; cursor: pointer;
        }

        .video-btn {
            border: 1px solid #d4af37; color: #d4af37; background: rgba(212, 175, 55, 0.1);
            padding: 12px; border-radius: 12px; font-size: 11px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px; width: 100%; margin-bottom: 12px;
        }

        .selected-card { border: 3px solid #d4af37 !important; transform: scale(1.02); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        
        /* แก้ไข Watermark ให้ลื่นไหลขึ้น */
        #watermark-layer {
            position: fixed; inset: 0; pointer-events: none; z-index: 9999; 
            opacity: 0.05; display: flex; flex-wrap: wrap; transform: rotate(-30deg) scale(1.5);
        }
        .wm-text { font-size: 14px; font-weight: bold; color: #d4af37; margin: 40px; white-space: nowrap; }

        .info-box { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.1); padding: 8px; border-radius: 10px; }
        .info-label { font-size: 9px; color: #d4af37; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-value { font-size: 11px; color: #fff; font-weight: 500; }

        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="watermark-layer"></div>

    <img id="bg-img" class="bg-full" src="https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png">
    <div id="bg-mask" class="bg-overlay"></div>

    <div id="login-view" class="relative z-[100] flex items-center justify-center min-h-screen px-6">
        <div class="glass-card w-full max-sm:max-w-xs p-10 text-center shadow-2xl">
            <h2 class="text-[#d4af37] font-serif tracking-[0.2em] uppercase text-xs mb-8">VIP Member Access</h2>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="text" id="user-id" placeholder="USER ID" class="custom-input uppercase" required>
                <input type="password" id="user-pass" placeholder="PASSWORD" class="custom-input" required>
                <button type="submit" class="gold-btn mt-2">Sign In</button>
            </form>
            <p id="err-msg" class="hidden text-red-500 text-[10px] mt-4 uppercase font-bold">Access Denied</p>
        </div>
    </div>

    <div id="intro-view" class="hidden relative z-[100] min-h-screen flex items-center justify-center px-6 py-10">
        <div class="glass-card w-full max-w-md p-8 overflow-y-auto max-h-[90vh] shadow-2xl">
            <h2 class="text-[#d4af37] font-serif text-center text-xl mb-6 uppercase tracking-widest">Service Guidelines</h2>
            <div class="bg-black/40 p-5 rounded-2xl border border-[#d4af37]/20 mb-6 text-[10px] space-y-3 text-neutral-300">
                <p>🔹 <strong>Group Size:</strong> Max 2 companions per reservation.</p>
                <p>🔹 <strong>Additional Requests:</strong> For more than 2 companions, please complete separate bookings.</p>
                <p>🔹 <strong>Rescheduling:</strong> Free with 48-hour notice.</p>
            </div>
            <button onclick="startGallery()" class="gold-btn shadow-lg">Acknowledge & Browse</button>
        </div>
    </div>

    <div id="home-view" class="hidden relative z-[50] min-h-screen py-12 px-4 max-w-6xl mx-auto fade-in">
        <div class="fixed inset-0 bg-black/90 z-[-1]"></div>
        <div class="text-center mb-8">
            <h1 class="text-2xl font-serif text-[#d4af37] tracking-widest uppercase">Gallery</h1>
            <p id="selection-count" class="text-neutral-500 text-[10px] mt-2 uppercase tracking-widest">Selected: 0/2</p>
        </div>
        <div id="main-gallery" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-32"></div>
        <div id="next-btn-container" class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black to-transparent flex justify-center hidden z-[200]">
            <button onclick="goToForm()" class="w-full max-w-md py-4 rounded-full bg-[#d4af37] text-black font-bold tracking-widest uppercase shadow-2xl">Confirm Selection</button>
        </div>
    </div>

    <div id="profile-modal" class="hidden fixed inset-0 z-[300] bg-black flex flex-col fade-in">
        <button onclick="closeProfile()" class="absolute top-6 right-6 z-[310] text-white text-3xl bg-black/50 w-12 h-12 rounded-full flex items-center justify-center">&times;</button>
        <div class="swiper mySwiper flex-grow">
            <div class="swiper-wrapper" id="modal-slides"></div>
            <div class="swiper-pagination"></div>
        </div>
        <div class="p-6 bg-gradient-to-t from-black via-black/95 to-transparent">
            <div id="profile-info-content" class="mb-6"></div>
            <button id="modal-video-btn" class="hidden video-btn">🎬 Watch Preview Video</button>
            <button id="modal-select-btn" class="gold-btn shadow-2xl">Add to Selection</button>
        </div>
    </div>

    <div id="video-overlay" class="hidden fixed inset-0 z-[500] bg-black/95 flex items-center justify-center p-4">
        <button onclick="closeVideo()" class="absolute top-8 right-8 text-white text-4xl z-[510]">&times;</button>
        <div class="w-full max-w-3xl aspect-video bg-black rounded-xl overflow-hidden shadow-2xl border border-white/10">
            <video id="player-source" controls playsinline class="w-full h-full"></video>
        </div>
    </div>

    <div id="form-view" class="hidden relative z-[400] min-h-screen flex items-center justify-center px-6 fade-in">
        <div class="glass-card w-full max-w-md p-8 shadow-2xl">
            <h2 class="text-[#d4af37] font-serif text-xl mb-6 text-center uppercase">Reservation</h2>
            <div class="space-y-4">
                <input type="date" id="book-date" class="custom-input">
                <input type="time" id="book-time" class="custom-input">
                <input type="text" id="book-course" placeholder="Golf Course Name" class="custom-input">
                <div class="bg-white/5 p-4 rounded-xl border border-white/10 text-center">
                    <div class="text-[10px] text-[#d4af37] mb-3 uppercase tracking-widest">Tee-time already booked?</div>
                    <div class="flex justify-center gap-8">
                        <label class="text-xs flex items-center gap-2 cursor-pointer"><input type="radio" name="booked-yet" value="Yes" class="accent-[#d4af37]"> Yes</label>
                        <label class="text-xs flex items-center gap-2 cursor-pointer"><input type="radio" name="booked-yet" value="No" class="accent-[#d4af37]"> No</label>
                    </div>
                </div>
                <button onclick="confirmBooking()" class="gold-btn mt-2">Book via LINE</button>
                <button onclick="backToHome()" class="w-full text-[10px] text-neutral-500 uppercase mt-4">Back to Gallery</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const VALID_ID = "VPB1001", VALID_PASS = "V1234", LINE_LINK = "https://lin.ee/wIkQHc5F";

        const companions = [
            {
                id: "BPC26001T", 
                name: "SNOW H160/W49 32/25/27", 
                price: "6,500 THB",
                golfScore: "105-109",
                language: "ENG- Good Conversation, Thai",
                drink: "Social Drinker",
                character: "Friendly & Calm & Elegant.. Focused on growth, good energy, and meaningful connections.",
                workDays: "Mon - Sat",
                shift: "Day Golf & Morning Tee",
                cover: "https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/Snow109/LINE_NOTE_260421_6.jpg",
                photos: [
                    "https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/Snow109/LINE_NOTE_260421_6.jpg",
                    "https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/Snow109/IMG_0116.jpeg",
                    "https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/Snow109/LINE_NOTE_260426_2.jpg"
                ],
                video: "https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/Snow109/798745786.161923.mp4"
            },
            {
                id: "BPC26002T", 
                name: "Princess H163/W48 33-24-35", 
                price: "6,500 THB",
                golfScore: "105-109",
                language: "English, Japanese",
                drink: "Social Drinker",
                character: "Friendly & Active Entertainer .. Cheerful, easygoing, and fun to be around ⛳ Let's enjoy!",
                workDays: "Everyday",
                shift: "Day Golf only",
                cover: "https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png", 
                photos: ["https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"], 
                video: null
            },
            { 
                id: "BPC26003T",
                name: "Nune 🩷26 H160/W46 34-25-35", 
                price: "6,500 THB",
                golfScore: "95-105", 
                language: "Eng- Good Conversation , Thai",
                drink: "Social Drinker",
                workDays: "Mon, Tue, Wed, Sat, Sun",
                character: "Freelance Model | Friendly & High Energy … I'm better at drinking than putting! 🍸 Golf is my passion, but fun is my mission.",
                shift: "Night Golf",
                cover: "https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png", 
                photos: ["https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"], 
                video: null
            },
            {
                id: "BPC26004T",
                name: "Yui H158/W41 34-4-33", 
                price: "6,500 THB", 
                golfScore: "95-105",
                language: "Eng- Basic Skills , Thai",
                drink: "Social Drinker",
                workDays: "Everyday",
                character: "Freelance Model | Friendly & Easy-going … I’m a small girl, but I love to have fun and enjoy golf!",
                shift: "Night Golf",
                cover: "https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png", 
                photos: ["https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"], 
                video: null
            },
            {
                id: "BPC26005T",
                name: "Junie H165/53 34-26,37", 
                price: "6,500 THB", 
                golfScore: "⛳ 115+", 
                language: "Eng-Good Conversation , Chinese Basic",
                drink: "Social Drinker",
                workDays: "Everyday",
                character: "Professional Entertainer (Singer/Financial Background) … I have experience in entertainment, including singing and dancing, which gives me a good understanding of creating atmosphere.",
                shift: "Night Golf",
                cover: "https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png", 
                photos: ["https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"], 
                video: null
            }
        ];

        let selected = [], currentSwiperGirl = null, swiperInstance;

        // --- Watermark Generator ---
        const wmLayer = document.getElementById('watermark-layer');
        for (let i = 0; i < 60; i++) {
            const span = document.createElement('span');
            span.className = 'wm-text';
            span.innerText = 'BANGKOK PARTEE VIP';
            wmLayer.appendChild(span);
        }

        // --- Security Features ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };
        window.addEventListener('blur', () => document.body.style.filter = 'blur(15px)');
        window.addEventListener('focus', () => document.body.style.filter = 'none');

        function handleLogin(e) {
            e.preventDefault();
            const id = document.getElementById('user-id').value.toUpperCase().trim();
            const pass = document.getElementById('user-pass').value;
            if (id === VALID_ID && pass === VALID_PASS) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('intro-view').classList.remove('hidden');
            } else { 
                document.getElementById('err-msg').classList.remove('hidden'); 
            }
        }

        function startGallery() {
            document.getElementById('intro-view').classList.add('hidden');
            document.getElementById('home-view').classList.remove('hidden');
            renderList();
        }

        function renderList() {
            document.getElementById('main-gallery').innerHTML = companions.map(c => `
                <div id="card-${c.id}" class="cursor-pointer group">
                    <div onclick="openProfile('${c.id}')" class="rounded-2xl overflow-hidden border border-white/10 card-frame bg-zinc-900 aspect-[3/4] relative">
                        <img src="${c.cover}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <p class="text-center mt-3 text-[#d4af37] font-bold text-[10px] uppercase tracking-widest">${c.name.split(' ')[0]}</p>
                </div>
            `).join('');
            updateSelectionUI();
        }

        function openProfile(id) {
            currentSwiperGirl = companions.find(c => c.id === id);
            const slides = currentSwiperGirl.photos.map(p => `<div class="swiper-slide"><img src="${p}" class="w-full h-full object-cover"></div>`).join('');
            document.getElementById('modal-slides').innerHTML = slides;
            
            document.getElementById('profile-info-content').innerHTML = `
                <div class="text-center mb-4">
                    <h2 class="text-[#d4af37] text-xl font-serif uppercase tracking-widest">${currentSwiperGirl.name}</h2>
                    <p class="text-neutral-400 text-[10px] font-bold mt-1">ID: ${currentSwiperGirl.id}</p>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="info-box"><p class="info-label">⛳ Golf Score</p><p class="info-value">${currentSwiperGirl.golfScore}</p></div>
                    <div class="info-box"><p class="info-label">🗣️ Language</p><p class="info-value">${currentSwiperGirl.language}</p></div>
                    <div class="info-box"><p class="info-label">🍸 Drinking</p><p class="info-value">${currentSwiperGirl.drink}</p></div>
                    <div class="info-box"><p class="info-label">📅 Days</p><p class="info-value">${currentSwiperGirl.workDays}</p></div>
                    <div class="info-box col-span-2"><p class="info-label">☀️ Working Shift</p><p class="info-value">${currentSwiperGirl.shift}</p></div>
                    <div class="info-box col-span-2"><p class="info-label">✨ Character</p><p class="info-value text-[10px] leading-relaxed">${currentSwiperGirl.character}</p></div>
                </div>
            `;

            const vBtn = document.getElementById('modal-video-btn');
            if (currentSwiperGirl.video) {
                vBtn.classList.remove('hidden');
                vBtn.onclick = () => playVideo(currentSwiperGirl.video);
            } else { vBtn.classList.add('hidden'); }

            document.getElementById('profile-modal').classList.remove('hidden');
            
            if (swiperInstance) swiperInstance.destroy();
            swiperInstance = new Swiper(".mySwiper", { 
                pagination: { el: ".swiper-pagination", clickable: true },
                observer: true,
                observeParents: true
            });

            const sBtn = document.getElementById('modal-select-btn');
            const isSelected = selected.includes(currentSwiperGirl.id);
            sBtn.innerText = isSelected ? "Remove Selection" : "Add to Selection";
            sBtn.className = isSelected ? "w-full py-4 rounded-xl bg-red-900/50 text-white border border-red-500 font-bold uppercase text-xs" : "gold-btn shadow-2xl";
            sBtn.onclick = () => toggleSelect(currentSwiperGirl.id);
        }

        function toggleSelect(id) {
            if (selected.includes(id)) { 
                selected = selected.filter(i => i !== id); 
            } else {
                if (selected.length >= 2) { 
                    alert("Maximum 2 companions allowed per reservation."); 
                    return; 
                }
                selected.push(id);
            }
            closeProfile(); 
            updateSelectionUI();
        }

        function updateSelectionUI() {
            companions.forEach(c => {
                const card = document.getElementById(`card-${c.id}`)?.querySelector('.card-frame');
                if (card) {
                    if (selected.includes(c.id)) card.classList.add('selected-card');
                    else card.classList.remove('selected-card');
                }
            });
            document.getElementById('selection-count').innerText = `Selected: ${selected.length}/2`;
            document.getElementById('next-btn-container').classList.toggle('hidden', selected.length === 0);
        }

        function playVideo(url) {
            const p = document.getElementById('player-source');
            p.src = url;
            document.getElementById('video-overlay').classList.remove('hidden');
            p.play();
        }
        function closeVideo() {
            const p = document.getElementById('player-source');
            p.pause(); p.src = "";
            document.getElementById('video-overlay').classList.add('hidden');
        }

        function closeProfile() { document.getElementById('profile-modal').classList.add('hidden'); }
        function goToForm() { document.getElementById('home-view').classList.add('hidden'); document.getElementById('form-view').classList.remove('hidden'); }
        function backToHome() { document.getElementById('form-view').classList.add('hidden'); document.getElementById('home-view').classList.remove('hidden'); }

        function confirmBooking() {
            const date = document.getElementById('book-date').value;
            const time = document.getElementById('book-time').value;
            const course = document.getElementById('book-course').value;
            const booked = document.querySelector('input[name="booked-yet"]:checked')?.value || "No";
            
            if(!date || !time || !course) { alert("Please complete all reservation fields."); return; }
            
            const selectedNames = companions.filter(c => selected.includes(c.id)).map(c => c.name.split(' ')[0]);
            
            const msg = `📍 *NEW RESERVATION*\n👯 Companions: ${selectedNames.join(', ')}\n📅 Date: ${date}\n⏰ Tee-off: ${time}\n⛳ Course: ${course}\n✅ Pre-booked: ${booked}`;
            
            window.location.href = `${LINE_LINK}?text=${encodeURIComponent(msg)}`;
            
            setTimeout(() => { 
                alert("Opening LINE for confirmation...");
                window.location.reload(); 
            }, 1000);
        }
    </script>
</body>
</html>
