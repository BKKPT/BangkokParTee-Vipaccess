<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bangkok ParTee - VIP Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700&display=swap');
        
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; height: 100%; }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* พื้นหลังหน้าปก ชัดเจน 100% */
        .bg-full { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; object-fit: cover; }
        
        /* หน้ากากสีดำปรับระดับความมืด */
        .bg-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 2; transition: background 0.8s ease; }

        /* กล่องหรูแบบ Glassmorphism */
        .glass-card {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
        }

        .custom-input {
            width: 100%; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(212, 175, 55, 0.3);
            color: #fff; padding: 15px; border-radius: 15px; text-align: center; outline: none; font-size: 16px;
        }
        .custom-input:focus { border-color: #d4af37; background: rgba(255, 255, 255, 0.15); }

        .gold-btn {
            width: 100%; background: linear-gradient(180deg, #e0c367 0%, #aa8529 100%);
            color: #000; font-weight: 800; padding: 16px; border-radius: 15px;
            text-transform: uppercase; letter-spacing: 2px; border: none; cursor: pointer;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        /* เอฟเฟกต์เลือกคน */
        .card-frame { transition: all 0.3s ease; border: 2px solid rgba(255,255,255,0.1); }
        .selected-card { border: 4px solid #d4af37 !important; transform: scale(1.05); box-shadow: 0 0 25px rgba(212, 175, 55, 0.5); }

        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <img id="bg-img" class="bg-full" src="https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png">
    <div id="bg-mask" class="bg-mask"></div>

    <div id="login-view" class="relative z-[100] flex items-center justify-center min-h-screen px-6 fade-in">
        <div class="glass-card w-full max-w-sm p-10 text-center">
            <h2 class="text-[#d4af37] font-serif tracking-[0.3em] uppercase text-sm mb-8">Member Access</h2>
            <div class="space-y-4">
                <input type="text" id="login-user" placeholder="USER ID" class="custom-input uppercase" autocomplete="off">
                <input type="password" id="login-pass" placeholder="PASSWORD" class="custom-input">
                <button onclick="handleLogin()" class="gold-btn">ENTER</button>
            </div>
            <p id="err-msg" class="hidden text-red-500 text-[10px] mt-6 font-bold uppercase tracking-widest">Invalid ID or Password</p>
        </div>
    </div>

    <div id="home-view" class="hidden relative z-[50] min-h-screen py-12 px-4 max-w-6xl mx-auto fade-in">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-serif text-[#d4af37] tracking-widest uppercase">Bangkok ParTee</h1>
            <p id="selection-count" class="text-neutral-300 text-[10px] tracking-[0.2em] uppercase mt-2 bg-black/50 inline-block px-4 py-1 rounded-full">Selected: 0/2</p>
        </div>
        <div id="main-gallery" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-32"></div>
        <div id="next-btn-container" class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black to-transparent flex justify-center hidden z-[60]">
            <button onclick="goToForm()" class="w-full max-w-md py-4 rounded-full bg-[#d4af37] text-black font-bold tracking-widest uppercase shadow-2xl transition-all active:scale-95">Next Step</button>
        </div>
    </div>

    <div id="form-view" class="hidden relative z-[150] min-h-screen flex items-center justify-center px-6 fade-in">
        <div class="glass-card w-full max-w-md p-8 shadow-2xl">
            <h2 class="text-[#d4af37] font-serif text-xl mb-6 text-center uppercase tracking-widest">Booking Details</h2>
            <div class="space-y-3">
                <input type="date" id="book-date" class="custom-input">
                <input type="time" id="book-time" class="custom-input">
                <input type="text" id="book-course" placeholder="Golf Course Name" class="custom-input">
                <div class="py-2 border-t border-white/10 mt-2 text-center">
                    <p class="text-[10px] text-[#d4af37] mb-2 uppercase tracking-widest">จองสนามแล้วหรือยัง?</p>
                    <div class="flex justify-center gap-10">
                        <label class="text-xs flex items-center gap-2 cursor-pointer"><input type="radio" name="booked-yet" value="Yes" class="accent-[#d4af37]"> Yes</label>
                        <label class="text-xs flex items-center gap-2 cursor-pointer"><input type="radio" name="booked-yet" value="No" class="accent-[#d4af37]"> No</label>
                    </div>
                </div>
                <p class="text-[9px] text-neutral-400 italic text-center leading-relaxed">
                    * ทางบริษัทมีบริการประสานงานรับจองเวลาและแคดดี้ให้ คิดค่าบริการเพียง 300 บาท เท่านั้น
                </p>
                <button onclick="confirmBooking()" class="gold-btn mt-4 shadow-xl">Confirm & Send LINE</button>
                <button onclick="backToHome()" class="w-full text-[10px] text-neutral-500 uppercase mt-4 block text-center">Back to Edit</button>
            </div>
        </div>
    </div>

    <script>
        // --- ⚙️ ตั้งค่าการเข้าถึง ⚙️ ---
        const MASTER_ID = "VPB1001";
        const MASTER_PASS = "V1234";
        const LINE_LINK = "https://lin.ee/wIkQHc5F"; // ลิงก์ LINE ของคุณ

        const companions = [
            {id:1,name:"Mochi",price:"5,000 THB",cover:"https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"},
            {id:2,name:"Nana",price:"5,500 THB",cover:"https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"},
            {id:3,name:"Yuki",price:"6,000 THB",cover:"https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"},
            {id:4,name:"Sora",price:"6,500 THB",cover:"https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"}
        ];

        let selected = [];

        // ฟังก์ชันล็อกอินที่ตรวจสอบแบบ 100%
        function handleLogin() {
            const u = document.getElementById('login-user').value.trim().toUpperCase();
            const p = document.getElementById('login-pass').value.trim();
            const err = document.getElementById('err-msg');

            if (u === MASTER_ID && p === MASTER_PASS) {
                document.getElementById('login-view').classList.add('hidden');
                // ปรับหน้ากากให้มืดลงเพื่อความหรูหราในหน้าถัดไป
                document.getElementById('bg-mask').style.background = "rgba(0, 0, 0, 0.85)";
                document.getElementById('home-view').classList.remove('hidden');
                renderList();
            } else {
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
            }
        }

        function renderList() {
            const container = document.getElementById('main-gallery');
            container.innerHTML = companions.map(c => `
                <div id="card-${c.id}" onclick="selectGirl(${c.id},'${c.name}')" class="cursor-pointer group">
                    <div class="rounded-2xl overflow-hidden card-frame">
                        <img src="${c.cover}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <p class="text-center mt-3 text-[#d4af37] font-bold text-xs uppercase tracking-widest">${c.name}</p>
                    <p class="text-center text-[10px] text-neutral-400 mt-1">${c.price}</p>
                </div>
            `).join('');
        }

        function selectGirl(id, name) {
            const card = document.getElementById(`card-${id}`).querySelector('.card-frame');
            if (selected.includes(name)) {
                selected = selected.filter(n => n !== name);
                card.classList.remove('selected-card');
            } else {
                if (selected.length >= 2) { alert("เลือกได้สูงสุด 2 ท่านค่ะ"); return; }
                selected.push(name);
                card.classList.add('selected-card');
            }
            document.getElementById('selection-count').innerText = `Selected: ${selected.length}/2`;
            document.getElementById('next-btn-container').classList.toggle('hidden', selected.length === 0);
        }

        function goToForm() {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('form-view').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function backToHome() {
            document.getElementById('form-view').classList.add('hidden');
            document.getElementById('home-view').classList.remove('hidden');
        }

        async function confirmBooking() {
            const date = document.getElementById('book-date').value;
            const time = document.getElementById('book-time').value;
            const course = document.getElementById('book-course').value;
            const booked = document.querySelector('input[name="booked-yet"]:checked')?.value || "No";

            if(!date || !time || !course) { alert("กรุณากรอกข้อมูลให้ครบถ้วน"); return; }

            const msgText = `📍 New Booking: Bangkok ParTee\n👯 รายชื่อ: ${selected.join(', ')}\n📅 วันที่: ${date}\n⏰ เวลา: ${time}\n⛳ สนาม: ${course}\n✅ จองสนามแล้ว: ${booked}`;
            const msg = encodeURIComponent(msgText);
            
            // ส่งข้อมูลไป Google Sheet
            try {
                fetch("https://script.google.com/macros/s/AKfycbyp2jwgxLIPXO4fI-sQNVa5-4DbEkVzwhp6TB4bnFctBA4VnBiJgVIsgkavTPA5pbYm/exec", {
                    method: "POST", mode: 'no-cors', body: JSON.stringify({name: selected.join(','), date, time, course, bookedYet: booked})
                });
            } catch(e) {}

            // ส่งข้อมูลไป LINE
            window.location.href = `${LINE_LINK}?text=${msg}`;
        }
    </script>
</body>
</html>
