<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bangkok ParTee - VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700&display=swap');
        
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* พื้นหลังหน้าปก */
        .bg-full { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; object-fit: cover; }
        .bg-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 2; }

        /* กล่อง Login/Form */
        .glass-card {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .custom-input {
            width: 100%; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(212, 175, 55, 0.3);
            color: #fff; padding: 15px; border-radius: 15px; text-align: center; outline: none;
        }
        .custom-input:focus { border-color: #d4af37; background: rgba(255, 255, 255, 0.12); }

        .gold-btn {
            width: 100%; background: linear-gradient(180deg, #e0c367 0%, #aa8529 100%);
            color: #000; font-weight: 800; padding: 16px; border-radius: 15px;
            text-transform: uppercase; letter-spacing: 2px; border: none; cursor: pointer;
        }

        .selected-card { border: 4px solid #d4af37 !important; transform: scale(1.05); }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <img id="bg-img" class="bg-full" src="https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png">
    <div id="bg-mask" class="bg-mask"></div>

    <div id="login-view" class="relative z-[100] flex items-center justify-center min-h-screen px-6">
        <div class="glass-card w-full max-w-sm p-10 text-center">
            <h2 class="text-[#d4af37] font-serif tracking-[0.3em] uppercase text-sm mb-8">MEMBER ACCESS</h2>
            <input type="text" id="user-id" placeholder="USER ID" class="custom-input mb-4 uppercase">
            <input type="password" id="user-pass" placeholder="PASSWORD" class="custom-input mb-6">
            <button onclick="checkLogin()" class="gold-btn">ENTER</button>
            <p id="err-msg" class="hidden text-red-500 text-xs mt-4 font-bold uppercase">Invalid ID or Password</p>
        </div>
    </div>

    <div id="home-view" class="hidden relative z-[50] min-h-screen py-12 px-4 max-w-6xl mx-auto fade-in">
        <div class="fixed inset-0 bg-black/85 z-[-1]"></div>
        
        <div class="text-center mb-10">
            <h1 class="text-3xl font-serif text-[#d4af37] tracking-widest uppercase">Bangkok ParTee</h1>
            <p id="selection-count" class="text-neutral-400 text-[10px] tracking-[0.2em] uppercase mt-2">Selected: 0/2</p>
        </div>

        <div id="main-gallery" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-32"></div>

        <div id="next-btn-container" class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black to-transparent flex justify-center hidden">
            <button onclick="goToForm()" class="w-full max-w-md py-4 rounded-full bg-[#d4af37] text-black font-bold tracking-widest uppercase shadow-2xl">Next Step</button>
        </div>
    </div>

    <div id="form-view" class="hidden relative z-[150] min-h-screen flex items-center justify-center px-6 fade-in">
        <div class="glass-card w-full max-w-md p-8 shadow-2xl">
            <h2 class="text-[#d4af37] font-serif text-xl mb-6 text-center uppercase tracking-widest">Booking Details</h2>
            <div class="space-y-3">
                <input type="date" id="book-date" class="custom-input">
                <input type="time" id="book-time" class="custom-input">
                <input type="text" id="book-course" placeholder="Golf Course Name" class="custom-input">
                
                <div class="py-2 border-t border-white/10 mt-2">
                    <p class="text-[10px] text-[#d4af37] mb-2 uppercase tracking-widest text-center">จองสนามแล้วหรือยัง?</p>
                    <div class="flex justify-center gap-10">
                        <label class="text-xs flex items-center gap-2 cursor-pointer"><input type="radio" name="booked-yet" value="Yes" class="accent-[#d4af37]"> Yes</label>
                        <label class="text-xs flex items-center gap-2 cursor-pointer"><input type="radio" name="booked-yet" value="No" class="accent-[#d4af37]"> No</label>
                    </div>
                </div>
                
                <p class="text-[9px] text-neutral-400 italic text-center">* มีบริการจองเวลาและแคดดี้ ค่าบริการ 300 บาท</p>
                
                <button onclick="sendFinalBooking()" class="gold-btn mt-4">Confirm & Send LINE</button>
                <button onclick="backToHome()" class="w-full text-[10px] text-neutral-500 uppercase mt-4">Back to Edit</button>
            </div>
        </div>
    </div>

    <script>
        const VALID_ID = "VPB1001";
        const VALID_PASS = "V1234";
        const LINE_URL = "https://lin.ee/wIkQHc5F";

        const companions = [
            {id:1,name:"Mochi",price:"5,000 THB",cover:"https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"},
            {id:2,name:"Nana",price:"5,500 THB",cover:"https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"},
            {id:3,name:"Yuki",price:"6,000 THB",cover:"https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"},
            {id:4,name:"Sora",price:"6,500 THB",cover:"https://raw.githubusercontent.com/BKKPT/BangkokParTee-Vipaccess/images/B35F50FC-CD71-4BC9-BC30-12277865EDA9.png"}
        ];

        let selectedNames = [];

        function checkLogin() {
            const id = document.getElementById('user-id').value.toUpperCase();
            const pass = document.getElementById('user-pass').value;
            const err = document.getElementById('err-msg');

            if (id === VALID_ID && pass === VALID_PASS) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('bg-img').classList.add('hidden');
                document.getElementById('bg-mask').classList.add('hidden');
                document.getElementById('home-view').classList.remove('hidden');
                renderGallery();
            } else {
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
            }
        }

        function renderGallery() {
            const el = document.getElementById('main-gallery');
            el.innerHTML = companions.map(p => `
                <div id="card-${p.id}" onclick="toggleSelect(${p.id},'${p.name}')" class="cursor-pointer group">
                    <div class="rounded-xl overflow-hidden border border-white/10 card-frame transition-all duration-300">
                        <img src="${p.cover}" class="w-full h-48 object-cover">
                    </div>
                    <p class="text-center mt-2 text-[#d4af37] font-bold text-xs uppercase tracking-widest">${p.name}</p>
                    <p class="text-center text-[10px] text-neutral-400">${p.price}</p>
                </div>
            `).join('');
        }

        function toggleSelect(id, name) {
            const el = document.getElementById(`card-${id}`).querySelector('.card-frame');
            if (selectedNames.includes(name)) {
                selectedNames = selectedNames.filter(x => x !== name);
                el.classList.remove("selected-card");
            } else {
                if (selectedNames.length >= 2) { alert("เลือกได้สูงสุด 2 คนค่ะ"); return; }
                selectedNames.push(name);
                el.classList.add("selected-card");
            }
            document.getElementById('selection-count').innerText = `Selected: ${selectedNames.length}/2`;
            document.getElementById('next-btn-container').classList.toggle('hidden', selectedNames.length === 0);
        }

        function goToForm() {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('form-view').classList.remove('hidden');
        }

        function backToHome() {
            document.getElementById('form-view').classList.add('hidden');
            document.getElementById('home-view').classList.remove('hidden');
        }

        async function sendFinalBooking() {
            const date = document.getElementById('book-date').value;
            const time = document.getElementById('book-time').value;
            const course = document.getElementById('book-course').value;
            const bookedYet = document.querySelector('input[name="booked-yet"]:checked')?.value || "No";

            if(!date || !time || !course) { alert("กรุณากรอกข้อมูลให้ครบถ้วน"); return; }

            const data = { name: selectedNames.join(", "), date, time, course, bookedYet };

            // 🔥 ส่ง Google Sheet
            try {
                await fetch("https://script.google.com/macros/s/AKfycbyp2jwgxLIPXO4fI-sQNVa5-4DbEkVzwhp6TB4bnFctBA4VnBiJgVIsgkavTPA5pbYm/exec", {
                    method: "POST", mode: 'no-cors', body: JSON.stringify(data)
                });
            } catch(e) {}

            // 🔥 ส่ง LINE
            const msg = encodeURIComponent(
                `📍 Bangkok ParTee Booking\n👯 ${data.name}\n📅 วันที่: ${date}\n⏰ เวลา: ${time}\n⛳ สนาม: ${course}\n✅ จองสนามแล้ว: ${bookedYet}`
            );
            window.location.href = `${LINE_URL}?text=${msg}`;
        }
    </script>
</body>
</html>
