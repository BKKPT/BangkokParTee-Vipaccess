<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bangkok ParTee</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#000; color:white; font-family:sans-serif; }
.custom-input { background: rgba(255,255,255,0.05); border:1px solid rgba(212,175,55,0.3); }
.selected-card { border:2px solid gold; }
.hidden { display:none; }
</style>
</head>

<body class="p-6">

<!-- LOGIN -->
<div id="login-view">
    <input type="password" id="vip-password" placeholder="PASSWORD" class="custom-input p-3 w-full mb-3 text-center">
    <button onclick="handleLogin(event)" class="bg-yellow-500 text-black p-3 w-full">Enter</button>
</div>

<!-- HOME -->
<div id="home-view" class="hidden">

<h1 class="text-xl mb-4 text-yellow-400">Select Companion</h1>

<div id="main-gallery" class="grid grid-cols-2 gap-3"></div>

<button onclick="goToForm()" class="bg-yellow-500 text-black p-3 w-full mt-4">
Next
</button>

</div>

<!-- FORM -->
<div id="form-view" class="hidden">

<input type="date" id="book-date" class="custom-input p-3 w-full mb-3">
<input type="time" id="book-time" class="custom-input p-3 w-full mb-3">
<input id="book-course" placeholder="Golf Course" class="custom-input p-3 w-full mb-3">

<div class="mb-3">
<label><input type="radio" name="booked-yet" value="Yes"> Yes</label>
<label><input type="radio" name="booked-yet" value="No"> No</label>
</div>

<button onclick="sendToLine()" class="bg-yellow-500 text-black p-3 w-full">
Confirm Booking
</button>

</div>

<script>
// 🔐 LOGIN
const ENCODED_PASS = "VklQ"; // VIP

function handleLogin(e){
    const input = document.getElementById('vip-password').value.toUpperCase();
    if(btoa(input) === ENCODED_PASS){
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('home-view').classList.remove('hidden');
        renderGallery();
    } else {
        alert("Wrong password");
    }
}

// 👯 COMPANIONS
const companions = [
 {id:1,name:"Mochi"},
 {id:2,name:"Nana"},
 {id:3,name:"Yuki"},
 {id:4,name:"Sora"}
];

let selectedIds = [];

function renderGallery(){
    const el = document.getElementById('main-gallery');
    el.innerHTML = companions.map(p=>`
        <div onclick="toggleSelect(${p.id},'${p.name}')" id="c${p.id}" class="p-4 border">
            ${p.name}
        </div>
    `).join('');
}

function toggleSelect(id,name){
    if(selectedIds.includes(name)){
        selectedIds = selectedIds.filter(x=>x!==name);
        document.getElementById("c"+id).classList.remove("selected-card");
    } else {
        if(selectedIds.length>=2){
            alert("เลือกได้ 2 คน");
            return;
        }
        selectedIds.push(name);
        document.getElementById("c"+id).classList.add("selected-card");
    }
}

// ➡️ FORM
function goToForm(){
    if(selectedIds.length===0){
        alert("เลือกก่อน");
        return;
    }
    document.getElementById('home-view').classList.add('hidden');
    document.getElementById('form-view').classList.remove('hidden');
}

// 🔥 FINAL FUNCTION
async function sendToLine(){

    const date = document.getElementById('book-date').value;
    const time = document.getElementById('book-time').value;
    const course = document.getElementById('book-course').value;
    const bookedYet = document.querySelector('input[name="booked-yet"]:checked')?.value || "Not specified";

    if(!date || !time || !course){
        alert("กรอกให้ครบ");
        return;
    }

    const data = {
        name: selectedIds.join(", "),
        date,
        time,
        course,
        bookedYet
    };

    // 🔥 SEND TO GOOGLE SHEET
    await fetch("https://script.google.com/macros/s/AKfycbyp2jwgxLIPXO4fI-sQNVa5-4DbEkVzwhp6TB4bnFctBA4VnBiJgVIsgkavTPA5pbYm/exec", {
        method: "POST",
        body: JSON.stringify(data)
    });

    // 🔥 LINE MESSAGE
    const message = encodeURIComponent(
        `📍 Bangkok ParTee Booking\n` +
        `👯 ${data.name}\n` +
        `📅 ${date}\n` +
        `⏰ ${time}\n` +
        `⛳ ${course}\n` +
        `✅ ${bookedYet}`
    );

    const lineDirect = `https://line.me/R/ti/p/@YOUR_ID?text=${message}`;
    const lineAdd = "https://lin.ee/p8PCYIi";

    alert("กำลังเปิด LINE...");

    window.open(lineDirect, "_blank");

    setTimeout(()=>{
        window.location.href = lineAdd;
    },1500);
}
</script>

</body>
</html>
